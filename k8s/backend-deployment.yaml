apiVersion: apps/v1
kind: Deployment

metadata:
  name: terrasecure-backend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: terrasecure-backend

  template:
    metadata:
      labels:
        app: terrasecure-backend

    spec:
      containers:
        - name: backend
          image: terrasecure-backend:latest

          ports:
            - containerPort: 5001